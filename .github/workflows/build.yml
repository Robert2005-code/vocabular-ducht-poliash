name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install capacitor-assets
        run: npm install -D @capacitor/assets
      - name: Add Android platform
        run: npx cap add android
      - name: Sync web assets
        run: npx cap sync android
      - name: Generate icons
        run: mkdir -p resources && cp icon.png resources/icon.png && npx capacitor-assets generate --android
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/wordra.jks
      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: android/app/wordra.jks
      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/wordra.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
